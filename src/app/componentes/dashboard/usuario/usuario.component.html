

<br>
<button mat-button (click)="abrirDialogoNuevoUsuario()">Nuevo Usuario</button>
<br>
<mat-card>
    <mat-card-title>Lista de Usuarios</mat-card-title>
    <mat-card-content>
        <mat-form-field>
            <mat-label>Filtro</mat-label>
            <input matInput (keyup)="aplicarFiltro($event)" placeholder="Ejemplo.. Bailon" #input>
        </mat-form-field>
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource">
                <ng-container matColumnDef="ID">
                  <th mat-header-cell *matHeaderCellDef> idUsuario</th>
                  <td mat-cell *matCellDef="let element"> {{element.id}} </td>
                </ng-container>
              
                <ng-container matColumnDef="NOMBRE">
                  <th mat-header-cell *matHeaderCellDef> Nombre </th>
                  <td mat-cell *matCellDef="let element"> {{element.nombres}} </td>
                </ng-container>
              
                <ng-container matColumnDef="APELLIDOS">
                  <th mat-header-cell *matHeaderCellDef> Apellidos </th>
                  <td mat-cell *matCellDef="let element"> {{element.apellidos}} </td>
                </ng-container>
              
                <ng-container matColumnDef="DNI">
                  <th mat-header-cell *matHeaderCellDef> Dni </th>
                  <td mat-cell *matCellDef="let element"> {{element.dni}} </td>
                </ng-container>
    
                <ng-container matColumnDef="CORREO">
                    <th mat-header-cell *matHeaderCellDef> Correo </th>
                    <td mat-cell *matCellDef="let element"> {{element.correo}} </td>
                </ng-container>
                
                <ng-container matColumnDef="ESTADO">
                <th mat-header-cell *matHeaderCellDef> Estado </th>
                <td mat-cell *matCellDef="let element">
                    <div *ngIf="element.estado === 1; else ladoNe">                
                        <span class="badge alert-secondary">Activo</span>
                    </div>
                    <ng-template #ladoNe>
                        <span class="badge alert-danger">Inactivo</span>
                    </ng-template>  
                </td>
                </ng-container>
            
                <ng-container matColumnDef="SEXO">
                <th mat-header-cell *matHeaderCellDef> Sexo </th>
                <td mat-cell  *matCellDef="let element">
                    <div *ngIf="element.sexo === 'M'; else ladoNe">                
                        Mujer
                    </div>
                    <ng-template #ladoNe>
                        Hombre
                    </ng-template>     
                </td>
                </ng-container>
            
                <ng-container matColumnDef="ROL">
                <th mat-header-cell *matHeaderCellDef> Rol </th>
                <td mat-cell *matCellDef="let element"> {{element.idRol.descripcion}} </td>
                </ng-container>
    
                <ng-container matColumnDef="ACCIONES">
                    <th mat-header-cell *matHeaderCellDef> Acciones </th>
                    <td mat-cell *matCellDef="let element">
                        <a class="pointer iconosAccion" matTooltip="Editar Usuario"><mat-icon class="success-icon">edit</mat-icon></a>
                        <a class="pointer iconosAccion" matTooltip="Bloquear Usuario"><mat-icon class="danger-icon">not_interested</mat-icon></a>
                        <a class="pointer iconosAccion" matTooltip="Exportar Datos"><mat-icon class="pdf-icon">picture_as_pdf</mat-icon></a>
                    </td>
                </ng-container>
              
                <tr mat-header-row *matHeaderRowDef="columnas"></tr>
                <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
              </table>
              <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                aria-label="">
            </mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
